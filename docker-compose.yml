services:
  beholden:
    build: .
    container_name: beholden
    ports:
      - "2385:2385"
    environment:
      - NODE_ENV=production
      - PORT=2385
      - HOST=0.0.0.0
    volumes:
      # Persist campaign/compendium data on host
      - beholden_data:/app/server/data
    restart: unless-stopped

volumes:
  beholden_data:
